name: Bug report
description: Something isn't working as documented or expected.
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out every section — incomplete reports are harder to reproduce and will be closed.

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: Run `npm ls @anter/ai-chat-sdk` and paste the result.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: "19.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
    validations:
      required: true

  - type: dropdown
    id: package-manager
    attributes:
      label: Package manager
      options:
        - pnpm
        - npm
        - yarn
        - bun
    validations:
      required: true

  - type: dropdown
    id: entry-point
    attributes:
      label: Affected entry point(s)
      description: Which package export is involved?
      multiple: true
      options:
        - "@anter/ai-chat-sdk (main)"
        - "@anter/ai-chat-sdk/headless"
        - "@anter/ai-chat-sdk/ui"
        - "@anter/ai-chat-sdk/adapters"
        - "@anter/ai-chat-sdk/types"
        - "@anter/ai-chat-sdk/styles.css"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        A CodeSandbox link, StackBlitz, or a short self-contained code snippet that reproduces the issue.
        The smaller the reproduction, the faster the fix.
      render: tsx
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Stack traces, screenshots, or anything else that might help.
